name: Secure RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    env:
      RDP_USER: LORD
      RDP_PASS: Password?

    steps:

    - name: Enable RDP (Secure)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
          -Name "fDenyTSConnections" -Value 0 -Force

        # Keep NLA enabled
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
          -Name "UserAuthentication" -Value 1 -Force

        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
          -Name "SecurityLayer" -Value 1 -Force

        netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

        Restart-Service -Name TermService -Force

    - name: Create RDP User (Using Env Password)
      run: |
        $username = "${env:RDP_USER}"
        $password = "${env:RDP_PASS}"

        if (-not $password) {
          Write-Error "RDP password is not set!"
          exit 1
        }

        $securePass = ConvertTo-SecureString $password -AsPlainText -Force

        # Remove existing user if exists (prevents conflict)
        if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
          Remove-LocalUser -Name $username
        }

        New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
        Add-LocalGroupMember -Group "Administrators" -Member $username
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username

    - name: Enable Dark Mode
      run: |
        Set-ItemProperty -Path HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize `
          -Name AppsUseLightTheme -Value 0 -Type Dword

        Set-ItemProperty -Path HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize `
          -Name SystemUsesLightTheme -Value 0 -Type Dword

    - name: Disable Windows Tips
      run: |
        New-ItemProperty -Path HKCU:\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager `
          -Name SubscribedContent-310093Enabled -Value 0 -PropertyType DWord -Force

        New-ItemProperty -Path HKCU:\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager `
          -Name SystemPaneSuggestionsEnabled -Value 0 -PropertyType DWord -Force

    - name: Configure Browsers
      run: |
        # Edge policies
        $edge = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
        New-Item -Path $edge -Force | Out-Null
        New-ItemProperty -Path $edge -Name HideFirstRunExperience -Value 1 -PropertyType DWord -Force
        New-ItemProperty -Path $edge -Name ForceDarkMode -Value 1 -PropertyType DWord -Force

        # Chrome policies
        $chrome = "HKLM:\SOFTWARE\Policies\Google\Chrome"
        New-Item -Path $chrome -Force | Out-Null
        New-ItemProperty -Path $chrome -Name HideFirstRunExperience -Value 1 -PropertyType DWord -Force

    - name: Install Tailscale
      run: |
        $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
        $file = "$env:TEMP\tailscale.msi"

        Invoke-WebRequest $url -OutFile $file
        Start-Process msiexec.exe -ArgumentList "/i `"$file`" /quiet /norestart" -Wait
        Remove-Item $file

    - name: Connect Tailscale
      run: |
        & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
          --authkey=${{ secrets.TAILSCALE }} `
          --hostname=gh-${{ github.run_id }}

        Start-Sleep 10

        $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
        echo "TS_IP=$ip" >> $env:GITHUB_ENV

    - name: Install Tools
      run: |
        choco install -y vscode bitwarden

    - name: Show Connection Info
      run: |
        Write-Host "`n====== RDP DETAILS ======"
        Write-Host "IP: $env:TS_IP"
        Write-Host "User: $env:RDP_USER"
        Write-Host "Pass: (hidden in logs)"
        Write-Host "========================`n"

    - name: Keep Alive
      run: |
        while ($true) {
          Write-Host "Running at $(Get-Date)"
          Start-Sleep -Seconds 300
        }
